<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Bridge Beta</title>
    <style>
        :root {
            --bg: #1e1e24;
            --card: #2a2b36;
            --accent: #5865F2;
            --text: #f2f3f5;
            --muted: #949ba4;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card);
            padding: 25px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .field {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            background: #111214;
            border: 1px solid #202225;
            border-radius: 4px;
            color: white;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            outline: 1px solid var(--accent);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #4752c4;
        }

        #status {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0; text-align:center;">Discord Bridge Beta</h2>
    
    <div class="field">
        <label>Paste Discord Webhook URL</label>
        <input type="text" id="webhook" placeholder="https://discord.com/api/webhooks/...">
    </div>

    <div class="field">
        <label>Custom Name</label>
        <input type="text" id="username" value="Zayden">
    </div>

    <div class="field">
        <label>Custom Avatar URL</label>
        <input type="text" id="avatar" placeholder="https://...">
    </div>

    <div class="field">
        <label>Message</label>
        <textarea id="message" rows="3" placeholder="Type a message..."></textarea>
    </div>

    <button onclick="sendMessage()">Send to Discord</button>
    <div id="status"></div>
</div>

<script>
async function sendMessage() {
    const webhookUrl = document.getElementById('webhook').value.trim();
    const username = document.getElementById('username').value.trim();
    const avatarUrl = document.getElementById('avatar').value.trim();
    const text = document.getElementById('message').value.trim();
    const status = document.getElementById('status');

    if (!webhookUrl || !text) {
        status.innerText = "❌ Missing Webhook URL or Message";
        status.style.color = "#f23f43";
        return;
    }

    const payload = { content: text };
    if (username) payload.username = username;
    if (avatarUrl) payload.avatar_url = avatarUrl;

    try {
        status.innerText = "Sending...";
        status.style.color = var(--muted);

        // Explicitly handling the request options to bypass standard browser restrictions
        const response = await fetch(webhookUrl, {
            method: 'POST',
            mode: 'cors', 
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload)
        });

        // Discord webhooks return a 244 No Content on success
        if (response.ok || response.status === 204) {
            status.innerText = "🚀 Sent successfully!";
            status.style.color = "#23a55a";
            document.getElementById('message').value = ""; // Clear message box
        } else {
            status.innerText = `❌ Error: ${response.status}`;
            status.style.color = "#f23f43";
        }
    } catch (err) {
        status.innerText = "❌ Connection Failed. Check your URL.";
        status.style.color = "#f23f43";
        console.error(err);
    }
}
</script>

</body>
</html>
